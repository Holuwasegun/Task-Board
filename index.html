<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="A modern task dashboard to manage pending and completed tasks with notes and date filtering." />
  <title>Task Dashboard · Focus</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="appShell" role="application" aria-label="Task Dashboard">
    <main class="workspace">
      <div class="header">
        <h1>&#9776; Task Board</h1>
        <div class="header-actions">
          <div class="counter" aria-live="polite">
            Pending
            <span class="number" id="pendingCount">0</span>
          </div>
        </div>
      </div>

      <form class="task-form" id="taskForm" autocomplete="off">
        <div class="form-row">
          <input type="text" id="taskTitleInput" placeholder="What needs to be done?" aria-label="New task title" required />
          <button type="submit" id="addBtn">Add Task</button>
        </div>
        <div class="form-expandable" id="formExpand">
          <textarea id="taskDescInput" placeholder="Brief description (optional)" rows="2" aria-label="Task description"></textarea>
          <textarea id="taskNotesInput" placeholder="Initial notes for this task (optional)" rows="2" aria-label="Initial notes" style="margin-top:8px;"></textarea>
          <label class="repetitive-label">
            <input type="checkbox" id="repetitiveCheck" />
            <span>&#128259;</span> Repeat daily
          </label>
        </div>
        <button type="button" class="expand-toggle" id="expandToggle">
          <span class="arrow" id="expandArrow">&#9660;</span>
          Add details
        </button>
      </form>

      <div class="day-picker" id="dayPicker">
        <label>
          <span class="day-icon">&#128197;</span> Working on
        </label>
        <input type="date" id="selectedDate" aria-label="Select day" title="Select day" />
      </div>

      <div class="tabs" role="tablist">
        <button role="tab" aria-selected="true" class="active" data-tab="pending" id="tabPending">
          Pending <span class="tab-badge" id="pendingBadge">0</span>
        </button>
        <button role="tab" aria-selected="false" data-tab="completed" id="tabCompleted">
          Completed <span class="tab-badge" id="completedBadge">0</span>
        </button>
      </div>

      <div class="task-list-wrap">
        <div class="task-list" id="taskList"></div>
      </div>
    </main>

    <aside class="sidebar" role="complementary" aria-label="Pending metrics and notes">
      <h2>&#128202; <span>Pending</span> Metrics</h2>

      <div class="sidebar-metrics">
        <div class="metric-card">
          <div class="value" id="metricPending">0</div>
          <div class="label">Pending</div>
        </div>
        <div class="metric-card completed-m">
          <div class="value" id="metricCompleted">0</div>
          <div class="label">Completed</div>
        </div>
        <div class="metric-card total">
          <div class="value" id="metricTotal">0</div>
          <div class="label">Total Tasks</div>
        </div>
        <div class="metric-card">
          <div class="value" id="metricCompletion">0%</div>
          <div class="label">Completion</div>
        </div>
      </div>

      <div class="sidebar-notes" id="sidebarNotes">
        <div class="notes-header">
          &#128221; Deep Notes
          <small id="notesContextLabel"></small>
        </div>
        <div class="empty-state" id="notesEmpty">
          <div class="icon">&#128213;</div>
          <div>Select a pending task</div>
          <div class="sub">Click any pending task to view and edit notes</div>
        </div>
        <div id="notesActive" style="display:none; flex-direction:column; flex:1; min-height:0;">
          <div class="selected-title" id="selectedTaskTitle"></div>
          <textarea id="notesTextarea"
            placeholder="Add detailed notes about why this task is pending, next steps, or any context&#8230;"></textarea>
          <div class="notes-actions">
            <button class="btn-save-notes" id="saveNotesBtn" disabled>Save Notes</button>
            <button class="btn-clear-notes" id="clearNotesBtn">Clear</button>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div class="modal-overlay" id="editModal" style="display:none;">
    <div class="modal-dialog">
      <div class="modal-header">
        <h3>&#9999; Edit Task</h3>
        <button class="modal-close" id="editCloseBtn">&times;</button>
      </div>
      <div class="modal-body">
        <label for="editTitleInput">Title</label>
        <input type="text" id="editTitleInput" />
        <label for="editDescInput">Description</label>
        <textarea id="editDescInput" rows="2"></textarea>
        <label for="editNotesInput">Notes</label>
        <textarea id="editNotesInput" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="editCancelBtn">Cancel</button>
        <button class="btn-primary" id="editSaveBtn">Save Changes</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
